name: Deploy to Cloud Run

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  PROJECT_ID: job-automation-jonas
  REGION: europe-west1
  SERVICE: financebro
  IMAGE: europe-west1-docker.pkg.dev/job-automation-jonas/finanzbro/financebro

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  deploy:
    name: Deploy to Cloud Run
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/384210760656/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@job-automation-jonas.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --memory=1024Mi \
            --cpu=1 \
            --cpu-boost \
            --no-cpu-throttling \
            --min-instances=0 \
            --max-instances=1 \
            --timeout=300 \
            --update-env-vars="ENVIRONMENT=production" \
            --update-env-vars="GCP_PROJECT_ID=${{ env.PROJECT_ID }}" \
            --update-env-vars="FMP_API_KEY=${{ secrets.FMP_API_KEY }}" \
            --update-env-vars="TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" \
            --update-env-vars="TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --update-env-vars="TELEGRAM_WEBHOOK_SECRET=${{ secrets.TELEGRAM_WEBHOOK_SECRET }}" \
            --update-env-vars="GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --update-env-vars="PARQET_PORTFOLIO_ID=${{ secrets.PARQET_PORTFOLIO_ID }}" \
            --update-env-vars="DASHBOARD_USER=${{ secrets.DASHBOARD_USER }}" \
            --update-env-vars="DASHBOARD_PASSWORD=${{ secrets.DASHBOARD_PASSWORD }}" \
            --update-env-vars="PRICE_UPDATE_INTERVAL_MIN=30" \
            --quiet

      - name: Show service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "### 🚀 Deployed to Cloud Run" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** $URL" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
